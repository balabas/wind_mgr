<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wind_mgr</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="toolbar">
  <span class="toolbar-title">wind_mgr</span>
  <button class="tb-btn" id="btn-fit">⊞ Fit</button>
  <button class="tb-btn" id="btn-reset">↺ Reset Layout</button>
  <button class="tb-btn" id="btn-refresh">↺ Refresh Thumbs</button>
  <button class="tb-btn" id="btn-auto">Auto</button>
  <span class="spacer"></span>
  <span class="status-text" id="status-text">—</span>
</div>

<div id="graph-container">
  <svg id="graph" width="100%" height="100%"></svg>
</div>

<!-- Context menu -->
<div id="context-menu">
  <div class="menu-header">Window actions</div>
  <div class="menu-item" onclick="ctxAction('activate')">▶ Activate window</div>
  <div class="menu-item" onclick="ctxAction('refresh_thumb')">↺ Refresh thumbnail</div>
  <div class="menu-separator"></div>
  <div class="menu-header">Move to project</div>
  <div id="ctx-project-list"></div>
  <div class="menu-item" onclick="ctxAction('move_with_children')">↳ Move with children</div>
  <div class="menu-separator"></div>
  <div class="menu-item" onclick="ctxAction('rename_project')">✎ Rename project</div>
</div>

<script src="d3.min.js?v=20260430-2118"></script>
<script src="config-loader.js?v=20260430-2118"></script>
<script src="graph.js?v=20260430-2118"></script>
</body>
</html>
