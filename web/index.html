<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wind_mgr</title>
  <link rel="stylesheet" href="style.css?v=20260504-0110">
</head>
<body>

<div id="toolbar">
  <span class="toolbar-title">wind_mgr</span>
  <button class="tb-btn" id="btn-fit">⊞ Fit</button>
  <button class="tb-btn" id="btn-reset">↺ Reset Layout</button>
  <button class="tb-btn" id="btn-refresh">↺ Refresh Thumbs</button>
  <span class="toolbar-options-label">Options:</span>
  <button class="tb-toggle" id="btn-raise-group" title="Off: only activate the clicked card's real window" aria-pressed="false">
    <span class="toggle-box">□</span><span class="toggle-text">Raise Group</span>
  </button>
  <span class="spacer"></span>
  <span class="status-text" id="status-text">—</span>
</div>

<div id="graph-container">
  <svg id="graph" width="100%" height="100%"></svg>
</div>

<!-- Card context menu -->
<div id="context-menu">
  <div class="menu-header">Monitors</div>
  <div id="ctx-monitor-list"></div>
  <div class="menu-separator"></div>
  <div class="menu-header">Place window to part of screen</div>
  <div id="ctx-placement-list"></div>
  <div class="menu-separator"></div>
  <div class="menu-submenu" id="ctx-move-project-submenu">
    <div class="menu-item submenu-trigger">Move to project <span>›</span></div>
    <div class="submenu-panel" id="ctx-project-list"></div>
  </div>
  <div class="menu-header">Window actions</div>
  <div class="menu-item" onclick="ctxAction('activate')">▶ Activate window</div>
  <div class="menu-item" onclick="ctxAction('refresh_thumb')">↺ Refresh thumbnail</div>
  <div class="menu-item" onclick="ctxAction('detach')">✂ Detach from parent</div>
  <div class="menu-item" onclick="ctxAction('unlink_children')">✂ Unlink all children</div>
</div>

<!-- Link context menu -->
<div id="link-context-menu">
  <div class="menu-header">Link actions</div>
  <div class="menu-item" onclick="ctxLinkAction('remove_link')">✂ Remove link</div>
</div>

<script src="d3.min.js?v=20260501-0108"></script>
<script src="config-loader.js?v=20260503-0115"></script>
<script src="graph.js?v=20260504-0260"></script>
</body>
</html>
