[startup]
# start_hidden: If true, wind_mgr starts tray/hotkey/edge services without showing the main window. Use this for Ubuntu autostart.
start_hidden = true

[capture]
# thumb_width: Maximum pixel width of saved window thumbnails. The saved image keeps the real window aspect ratio.
thumb_width = 720

# thumb_height: Maximum pixel height of saved window thumbnails. The saved image keeps the real window aspect ratio.
thumb_height = 450

# icon_size: Pixel size for saved app icons. Increase for sharper icons on high-DPI displays.
icon_size = 64

# active_refresh_interval: Seconds between automatic thumbnail refreshes for the currently active window while wind_mgr is visible. Hidden mode pauses only this frequent active refresh; focus-leave and rare background captures still run.
active_refresh_interval = 1

# background_refresh_interval: Seconds between sequential background thumbnail refreshes for inactive windows (one window per tick). This continues while wind_mgr is hidden so old cards do not become stale.
background_refresh_interval = 10

# background_refresh_min_interval: Minimum seconds before the same inactive window is eligible for another background thumbnail refresh.
background_refresh_min_interval = 10

# new_window_capture_delay: Seconds to wait before the first thumbnail capture for a newly opened window. This avoids blank thumbnails while apps are still painting their first frame.
new_window_capture_delay = 1

# capture_retry_interval: Seconds between retry attempts after a thumbnail capture fails. Failed/new windows are retried faster than normal background refresh until a screenshot succeeds.
capture_retry_interval = 1

# capture_retry_max_attempts: Maximum retry attempts after failed thumbnail captures. Set 0 for unlimited retries.
capture_retry_max_attempts = 12

# graph_push_min_interval: Minimum seconds between full graph redraw pushes caused by window/title/topology changes. Thumbnail refreshes use a separate lightweight image update path.
graph_push_min_interval = 3

# activity_priority_enabled: If true, background thumbnail refresh picks the most-used/recently-used eligible window instead of plain round-robin.
activity_priority_enabled = true

# activity_half_life_seconds: How quickly recent focus/click/hover activity loses priority. 900 means activity weight halves after 15 minutes.
activity_half_life_seconds = 900

# live_preview_enabled: If true, hovering a card opens a native XComposite/OpenGL popup preview. Keep false to preserve SVG overlays and use thumbnail streaming instead.
live_preview_enabled = false

# hover_refresh_interval: Seconds between SVG thumbnail refreshes for the currently hovered card. Keep lower than active_refresh_interval so hover feels more live.
hover_refresh_interval = 0.5

# pynput notation: Use <cmd> for the Super/Windows key and <ctrl> for the Control key. See pynput docs for details. Sample hotkey: '<ctrl>+<cmd>+r' for Ctrl+Super+R.
hotkey = <ctrl>+<cmd>+a

[edge_zones]
# enabled: If true, moving the mouse into a monitor edge band triggers wind_mgr show/hide actions. Works on X11 where global pointer position is available.
enabled = true

# edge_size: Height in pixels of the active edge band on every monitor. Small values require touching the exact screen edge.
edge_size = 3

# poll_interval_ms: How often to check global mouse position. Lower reacts faster but wakes the GTK loop more often. Values below 80 can keep the GTK/X11 main loop hot while wind_mgr is hidden.
poll_interval_ms = 80

# toggle_cooldown_ms: Minimum delay between edge actions. Also prevents repeated toggles while the pointer stays near an edge.
toggle_cooldown_ms = 300

# bottom_action: Action when entering the bottom edge of any monitor. Allowed values: toggle, show, hide, none.
bottom_action = toggle

# top_action: Action when entering the top edge of any monitor. Allowed values: toggle, show, hide, none.
top_action = hide

[activation]
# default_raise_card_group_on_card_activate: Startup default for the toolbar
# "Raise Group" toggle. If true, clicking a card first brings
# forward other real windows whose cards are inside the same card group as the
# clicked card, then activates the clicked window last so it should become the
# focused top window.
default_raise_card_group_on_card_activate = true

# default_auto_parent_on_open: When true, any new window that opens is
# automatically added as a child of the currently active window. This applies
# to apps launched from any launcher (GNOME Activities, dock, terminal, etc.).
# Apps launched from wind_mgr's own radial menu always use the more precise
# PID-based hint and are not affected by this setting.
# Can be toggled at runtime from the toolbar.
default_auto_parent_on_open = true

# raise_card_group_method: Method used to bring other windows from the clicked
# card's card group forward before activating the selected window.
# Allowed values:
# - restack: request X11 _NET_RESTACK_WINDOW plus XRaiseWindow fallback. Usually
#   avoids focus flicker, but GNOME/Mutter may ignore it for some windows.
# - activate: activate each group window sequentially, then activate the clicked
#   window last. More reliable, but focus may visibly pass through each window.
raise_card_group_method = activate

# active_window_show_animation: If true, when wind_mgr is shown it animates the
# previously active real-window rectangle/thumbnail from its screen position to
# the matching card. This is visual only and does not change focus or real
# window position/size.
active_window_show_animation = true

# active_window_show_animation_ms: Duration of the show animation in
# milliseconds. Increase for slower movement; decrease for a quicker cue.
active_window_show_animation_ms = 200

[layout]
# cardGroupSpacing: Distance between card groups in both horizontal and vertical directions. Increase for more space between group outlines; decrease for tighter layout.
cardGroupSpacing = 230

# cardGroupBoundaryPadding: Extra pixels around cards when drawing the dashed/fill group outline. Larger makes each group outline bigger.
cardGroupBoundaryPadding = 30

# cardGroupBoundaryShape: Visual group-outline style. Use cards for tight per-card outlines; use convex for one outer polygon around the whole group.
cardGroupBoundaryShape = convex

# cardGroupBoundaryCornerRadius: Pixel radius for rounding group-outline corners. Set 0 for sharp corners.
cardGroupBoundaryCornerRadius = 18

# dropIntoPad: Extra pixels around each existing card that count as dropping into that card's group. Smaller makes it easier to drag a card out.
dropIntoPad = 30

# dropParentInnerPad: Card-parent linking area inside the target card. Negative values shrink the card hitbox, so group highlight appears first and parent-card highlight appears only deeper over the card.
dropParentInnerPad = -18

# dropCardGroupPadding: Extra pixels around another group's drop area. Increase if insertion into another group is too hard.
dropCardGroupPadding = 30

# dropNearestDistance: Maximum distance from another card-group center where a dropped card can snap into it. Set 0 to disable nearest-group snapping.
dropNearestDistance = 0

# cardGroupMargin: Empty space around the card-group layout grid. Larger keeps groups farther from wind_mgr window edges.
cardGroupMargin = 80

# sameCardGroupLinkDistance: Target link length between parent/child cards inside the same card group. Larger spreads connected cards apart inside one group.
sameCardGroupLinkDistance = 200

# sameCardGroupLinkStrength: How strongly same-group links enforce their target length. Higher makes connected cards move together more.
sameCardGroupLinkStrength = 0.35

# crossCardGroupLinkStrength: How strongly links between different card groups pull groups together. Keep low to prevent group-outline overlap.
crossCardGroupLinkStrength = 0.01

# cardRepelStrength: Push force between all cards. More negative pushes cards farther apart; less negative allows tighter packing.
cardRepelStrength = -200

# cardCollisionRadius: Extra gap in pixels added beyond each card's own bounding radius. 0 = cards nearly touch; 20 = comfortable gap; higher if cards still overlap.
cardCollisionRadius = 12

# cardArea: Target visual area of each card in graph units. Higher makes all cards larger while preserving each window's aspect ratio.
cardArea = 25200

# cardMinWidth: Minimum card width. Increase if very vertical windows become too narrow to recognize.
cardMinWidth = 110

# cardMaxWidth: Maximum card width. Increase if wide monitor/window thumbnails should appear wider.
cardMaxWidth = 300

# cardMinHeight: Minimum card height. Increase if very wide windows become too short to recognize.
cardMinHeight = 90

# cardMaxHeight: Maximum card height. Increase if vertical monitor/window thumbnails should appear taller.
cardMaxHeight = 260

# cardIconSize: App icon size in pixels (shown top-right corner of each card).
cardIconSize = 40

# cardIconPad: Padding in pixels between the icon and its dark background border.
cardIconPad = 4

# cardGroupTightness: Pull toward the average position of cards in the same group. Higher keeps a group's cards closer together.
cardGroupTightness = 0.18

# cardGroupCircleSeparationStrength: How strongly circular group separation pushes groups apart. Higher separates faster but movement may look sudden.
cardGroupCircleSeparationStrength = 0.38

# cardGroupRectangleSeparationStrength: How strongly overlapping card-group bounding rectangles are pushed apart. Higher resolves overlap faster.
cardGroupRectangleSeparationStrength = 1.05

# otherGroupProtectedGap: Extra protected space around each group outline. Increase if outside cards enter the wrong group.
otherGroupProtectedGap = 90

# otherGroupPushOutStrength: How strongly a card is pushed out when it enters another group's protected space.
otherGroupPushOutStrength = 0.75

# cardGroupGridStrength: Pull from each card group toward its assigned grid position. Higher keeps groups more aligned to the grid.
cardGroupGridStrength = 0.035

# centerStrength: Pull everything toward the middle of the window. Keep low; high values can pull groups into each other.
centerStrength = 0.01

# velocityDecay: How quickly movement slows down each frame. Higher stops motion sooner; lower allows cards/groups to keep moving longer.
velocityDecay = 0.65

# alphaDecay: How quickly the layout engine reduces force calculations. Higher stops layout updates sooner; lower keeps adjusting longer to fix overlaps.
alphaDecay = 0.03

# fitMarginLeft: Extra empty space on the left after Fit. Increase if leftmost cards are too close to the window edge.
fitMarginLeft = 160

# fitMarginRight: Extra empty space on the right after Fit. Increase if rightmost cards are too close to the window edge.
fitMarginRight = 160

# fitMarginTop: Extra empty space at the top after Fit. Increase if top cards are hidden under the toolbar or too close to the top.
fitMarginTop = 240

# fitMarginBottom: Extra empty space at the bottom after Fit. Increase if bottom cards are too close to the window edge.
fitMarginBottom = 140

# maxZoom: Maximum zoom-in level. Increase if you need to inspect thumbnails closer.
maxZoom = 6

# zoomWheelSensitivity: Mouse wheel zoom speed. Lower values make zoom slower/finer; higher values make each wheel step zoom farther.
zoomWheelSensitivity = 0.001

# cardGroupLabelGap: Empty space between the top of a group outline and its label. Decrease for labels closer to single-card groups; increase if labels touch cards.
cardGroupLabelGap = 18

# hierarchyGap: Minimum vertical distance from a parent card to its child cards. Increase to make parent-child links look more like a tree.
hierarchyGap = 160

# hierarchyStrength: How strongly child cards are pushed below parent cards. Higher makes the tree shape stronger but may move cards more.
hierarchyStrength = 3.00

# hierarchySiblingSpread: Horizontal spacing between children of the same parent. Increase to reduce overlapping branches in the same card group.
hierarchySiblingSpread = 180

# hierarchyPrelayoutEnabled: If true, a card group starts from a tree-like placement the first time it appears in graph space. Link/unlink changes do not re-layout an already initialized group.
hierarchyPrelayoutEnabled = true

# hierarchyBranchStrength: How strongly a child branch moves as one lane when a parent has multiple children. Increase if branches cross; decrease if branches move too aggressively.
hierarchyBranchStrength = 0.45

# hierarchyOrderStrength: How strongly sibling branches keep their current left-to-right order. Increase if branches cross each other; decrease if layout becomes too wide.
hierarchyOrderStrength = 0.16

# linkCurveSpread: Horizontal offset used when drawing multiple branches from the same parent card. Increase if curved links overlap visually; decrease if links look too wide.
linkCurveSpread = 110

# linkCardAvoidanceMargin: Extra protected distance around link paths. Increase if unrelated cards overlap links; set 0 to disable link-card avoidance.
linkCardAvoidanceMargin = 40

# linkCardAvoidanceStrength: How strongly cards are pushed away from unrelated links inside the same card group. Increase if links pass through cards; decrease if cards move too much.
linkCardAvoidanceStrength = 0.34

# linkCardAvoidanceSamples: Number of points used to approximate each curved link for card avoidance. Higher is more accurate but costs more CPU.
linkCardAvoidanceSamples = 10

# clickMoveTolerancePx: Maximum pointer movement still treated as a short click on a card. Above this distance the action is treated as dragging.
clickMoveTolerancePx = 8

# clickHoldTimeoutMs: Maximum mouse-down hold time still treated as a short click. Holding longer starts drag/selection intent and does not activate the bound window.
clickHoldTimeoutMs = 250
