[capture]
# thumb_width: Maximum pixel width of saved window thumbnails. The saved image keeps the real window aspect ratio.
thumb_width = 720

# thumb_height: Maximum pixel height of saved window thumbnails. The saved image keeps the real window aspect ratio.
thumb_height = 450

# icon_size: Pixel size for saved app icons. Increase for sharper icons on high-DPI displays.
icon_size = 64

[layout]
# hullPad: Extra pixels around cards when drawing dashed group boundaries. Larger makes each boundary shape bigger.
hullPad = 30

# hullShape: Visual boundary style. Use cards for tight per-card outlines; use convex for one outer polygon around the whole group.
hullShape = convex

# projectMarginX: Empty space on the left and right of the group layout grid. Larger keeps groups farther from window edges.
projectMarginX = 260

# projectMarginY: Empty space above and below the group layout grid. Larger keeps groups farther from window edges.
projectMarginY = 220

# projectCellW: Target horizontal distance between group centers. Increase first when groups are too close left-to-right.
projectCellW = 720

# projectCellH: Target vertical distance between group centers. Increase first when groups are too close top-to-bottom.
projectCellH = 540

# sameProjectLinkDistance: Target line length between cards in the same group. Larger spreads connected cards apart inside one group.
sameProjectLinkDistance = 180

# crossProjectLinkDistance: Target line length between cards in different groups. Larger keeps connected groups farther apart.
crossProjectLinkDistance = 680

# sameProjectLinkStrength: How strongly same-group lines enforce their target length. Higher makes connected cards move together more.
sameProjectLinkStrength = 0.35

# crossProjectLinkStrength: How strongly cross-group lines pull groups together. Keep low to prevent boundary overlap.
crossProjectLinkStrength = 0.01

# nodeCharge: Push force between all cards. More negative pushes cards farther apart; less negative allows tighter packing.
nodeCharge = -400

# nodeCollideRadius: Invisible personal space around each card. Increase if cards overlap.
nodeCollideRadius = 120

# cardArea: Target visual area of each card in graph units. Higher makes all cards larger while preserving each window's aspect ratio.
cardArea = 25200

# cardMinWidth: Minimum card width. Increase if very vertical windows become too narrow to recognize.
cardMinWidth = 110

# cardMaxWidth: Maximum card width. Increase if wide monitor/window thumbnails should appear wider.
cardMaxWidth = 300

# cardMinHeight: Minimum card height. Increase if very wide windows become too short to recognize.
cardMinHeight = 90

# cardMaxHeight: Maximum card height. Increase if vertical monitor/window thumbnails should appear taller.
cardMaxHeight = 260

# clusterStrength: Pull toward the average position of cards in the same group. Higher keeps a group's cards closer together.
clusterStrength = 0.18

# projectCirclePadding: Extra space between whole groups using a circular distance check. Increase for more group separation.
projectCirclePadding = 360

# projectCircleStrength: How strongly circular group separation pushes groups apart. Higher separates faster but movement may look sudden.
projectCircleStrength = 0.38

# projectRectGap: Minimum empty space between group boundary rectangles. Increase when dashed boundaries overlap.
projectRectGap = 300

# projectRectStrength: How strongly overlapping boundary rectangles are pushed apart. Higher resolves overlap faster.
projectRectStrength = 1.05

# foreignCardBoundaryGap: Extra protected space around each group boundary. Increase if outside cards enter the wrong boundary.
foreignCardBoundaryGap = 90

# foreignCardBoundaryStrength: How strongly a card is pushed out when it enters another group's protected space.
foreignCardBoundaryStrength = 0.75

# projectAnchorStrength: Pull from each group toward its assigned grid position. Higher keeps groups more aligned to the grid.
projectAnchorStrength = 0.035

# centerStrength: Pull everything toward the middle of the window. Keep low; high values can pull groups into each other.
centerStrength = 0.01

# velocityDecay: How quickly movement slows down each frame. Higher stops motion sooner; lower allows cards/groups to keep moving longer.
velocityDecay = 0.65

# alphaDecay: How quickly the layout engine reduces force calculations. Higher stops layout updates sooner; lower keeps adjusting longer to fix overlaps.
alphaDecay = 0.03

# fitMarginLeft: Extra empty space on the left after Fit. Increase if leftmost cards are too close to the window edge.
fitMarginLeft = 160

# fitMarginRight: Extra empty space on the right after Fit. Increase if rightmost cards are too close to the window edge.
fitMarginRight = 160

# fitMarginTop: Extra empty space at the top after Fit. Increase if top cards are hidden under the toolbar or too close to the top.
fitMarginTop = 240

# fitMarginBottom: Extra empty space at the bottom after Fit. Increase if bottom cards are too close to the window edge.
fitMarginBottom = 140

# maxZoom: Maximum zoom-in level. Increase if you need to inspect thumbnails closer.
maxZoom = 6

# groupLabelGap: Empty space between the top of a group boundary and its label. Decrease for labels closer to single-card groups; increase if labels touch cards.
groupLabelGap = 18
