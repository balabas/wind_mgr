name: Syntax Check

on:
  push:
  pull_request:

jobs:
  py-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile Python sources
        run: |
          python -m compileall -q \
            main.py \
            bridge \
            capture \
            core \
            live_preview \
            providers \
            ui
